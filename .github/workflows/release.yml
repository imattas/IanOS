name: Release Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  image:
    name: Build release disk image
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        shell: powershell
        run: |
          choco install llvm cmake ninja nasm python -y --no-progress
          "C:\Program Files\LLVM\bin" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
          "C:\Program Files\NASM" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

      - name: Build image
        shell: powershell
        run: .\scripts\build.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ianos-release-image
          path: |
            build/out/image/kernel.img
            build/out/manifest.txt
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/out/image/kernel.img
            build/out/manifest.txt
